replicaCount: 2

image:
  repository: ghcr.io/yourusername/distributed-services
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

namespace: cse474-prod

env:
  NODE_ENV: production
  PORT: 80
