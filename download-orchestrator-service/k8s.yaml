apiVersion: apps/v1
kind: Deployment
metadata:
  name: download-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: download-orchestrator
  template:
    metadata:
      labels:
        app: download-orchestrator
    spec:
      containers:
        - name: download-orchestrator
          image: download-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              value: "mongodb://mongo-download:27017/download_orchestrator_db"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: DOWNLOADED_TOPIC
              value: "file.downloaded"
---
apiVersion: v1
kind: Service
metadata:
  name: download-orchestrator
spec:
  selector:
    app: download-orchestrator
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
