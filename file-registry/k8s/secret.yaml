apiVersion: v1
kind: Secret
metadata:
  name: file-registry-secret
  namespace: file-platform
type: Opaque
# Values are base64-encoded. In production, use a secrets manager
# (AWS Secrets Manager, HashiCorp Vault, or K8s External Secrets Operator)
stringData:
  DB_HOST: "postgres-file-registry"
  DB_PORT: "5432"
  DB_NAME: "file_registry_db"
  DB_USER: "file_registry_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
