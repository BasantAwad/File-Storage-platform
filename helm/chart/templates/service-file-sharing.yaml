{{- if .Values.fileSharing.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: file-sharing
  namespace: {{ .Values.namespace }}
  labels:
    app: file-sharing
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: {{ .Values.fileSharing.port }}
    protocol: TCP
    name: http
  - port: 9091
    targetPort: 9091
    protocol: TCP
    name: metrics
  selector:
    app: file-sharing
{{- end }}
