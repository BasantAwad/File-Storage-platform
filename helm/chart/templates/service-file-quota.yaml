{{- if .Values.fileQuota.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: file-quota-service
  namespace: {{ .Values.namespace }}
  labels:
    app: file-quota-service
spec:
  type: ClusterIP
  selector:
    app: file-quota-service
  ports:
  - name: http
    port: 80
    targetPort: {{ .Values.fileQuota.port }}
{{- end }}
