{{- if .Values.presignedUrl.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presigned-url-service
  namespace: {{ .Values.namespace }}
  labels:
    app: presigned-url-service
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    owner: basant
spec:
  replicas: {{ .Values.presignedUrl.replicaCount }}
  selector:
    matchLabels:
      app: presigned-url-service
  template:
    metadata:
      labels:
        app: presigned-url-service
    spec:
      containers:
      - name: presigned-url-service
        image: "{{ .Values.image.registry }}/presigned-url-service:{{ .Values.presignedUrl.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.presignedUrl.port }}
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: port
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: node-env
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-name
        - name: STORAGE_GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: storage-gateway-url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: log-level
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: presigned-url-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: presigned-url-secrets
              key: db-password
        resources:
          {{- toYaml .Values.presignedUrl.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
{{- end }}
