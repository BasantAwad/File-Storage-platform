apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-session
  namespace: file-platform
  labels:
    app: upload-session
    version: "1.0.0"
    domain: file
spec:
  replicas: 2
  selector:
    matchLabels:
      app: upload-session
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: upload-session
        version: "1.0.0"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: upload-session
          image: ghcr.io/your-org/upload-session:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3008
              name: http
          env:
            - name: PORT
              value: "3008"
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: upload-session-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: upload-session-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: upload-session-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: upload-session-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: upload-session-secret
                  key: DB_PASSWORD
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: upload-session-config
                  key: KAFKA_BROKERS
            - name: FILE_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: upload-session-config
                  key: FILE_REGISTRY_URL
            - name: CHUNK_CATALOG_URL
              valueFrom:
                configMapKeyRef:
                  name: upload-session-config
                  key: CHUNK_CATALOG_URL
            - name: SESSION_TTL_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: upload-session-config
                  key: SESSION_TTL_MINUTES
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: Always
