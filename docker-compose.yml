version: '3.8'

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    networks:
      - nexus-network
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - nexus-network
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Databases
  # ─────────────────────────────────────────────
  api_keys_db:
    image: postgres:15-alpine
    container_name: api_keys_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_keys_db
    ports:
      - '5435:5432'
    volumes:
      - api_keys_db_data:/var/lib/postgresql/data
    networks:
      - nexus-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d api_keys_db']
      interval: 10s
      timeout: 5s
      retries: 5

  rate_limit_db:
    image: postgres:15-alpine
    container_name: rate_limit_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rate_limit_db
    ports:
      - '5436:5432'
    volumes:
      - rate_limit_db_data:/var/lib/postgresql/data
    networks:
      - nexus-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rate_limit_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Microservices (Mohamed Alsariti - 22101901)
  # ─────────────────────────────────────────────
  api-keys-service:
    build:
      context: ./api-keys-service
      dockerfile: Dockerfile
    container_name: api-keys-service
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      DB_HOST: api_keys_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: api_keys_db
      KAFKA_BROKER: kafka:9092
      NODE_ENV: production
    depends_on:
      api_keys_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3005/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  rate-limit-service:
    build:
      context: ./rate-limit-service
      dockerfile: Dockerfile
    container_name: rate-limit-service
    ports:
      - '3006:3006'
    environment:
      PORT: 3006
      DB_HOST: rate_limit_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rate_limit_db
      KAFKA_BROKER: kafka:9092
      NODE_ENV: production
    depends_on:
      rate_limit_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3006/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  nexus-network:
    driver: bridge

volumes:
  api_keys_db_data:
  rate_limit_db_data:
