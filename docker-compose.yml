version: '3.9'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
    - 2181:2181
    networks:
    - nexus-network
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
    - zookeeper
    ports:
    - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test:
      - CMD
      - kafka-broker-api-versions
      - --bootstrap-server
      - localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - nexus-network
  db-file-quota:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quota_db
    ports:
    - 5432:5432
    networks:
    - nexus-network
    volumes:
    - quota-db-data:/var/lib/postgresql/data
  db-presigned-url:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_db
    ports:
    - 5433:5432
    networks:
    - nexus-network
    volumes:
    - url-db-data:/var/lib/postgresql/data
  file-quota-service:
    build:
      context: ./file-quota-service
    ports:
    - 3001:3001
    environment:
    - NODE_ENV=development
    - PORT=3001
    - DB_HOST=db-file-quota
    - DB_PORT=5432
    - DB_USER=postgres
    - DB_PASSWORD=postgres
    - DB_NAME=quota_db
    - KAFKA_BROKER=kafka:9092
    depends_on:
    - db-file-quota
    - kafka
    networks:
    - nexus-network
  presigned-url-service:
    build:
      context: ./presigned-url-service
    ports:
    - 3002:3002
    environment:
    - NODE_ENV=development
    - PORT=3002
    - DB_HOST=db-presigned-url
    - DB_PORT=5432
    - DB_USER=postgres
    - DB_PASSWORD=postgres
    - DB_NAME=url_db
    depends_on:
    - db-presigned-url
    networks:
    - nexus-network
  api_keys_db:
    image: postgres:15-alpine
    container_name: api_keys_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_keys_db
    ports:
    - 5435:5432
    volumes:
    - api_keys_db_data:/var/lib/postgresql/data
    networks:
    - nexus-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d api_keys_db
      interval: 10s
      timeout: 5s
      retries: 5
  rate_limit_db:
    image: postgres:15-alpine
    container_name: rate_limit_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rate_limit_db
    ports:
    - 5436:5432
    volumes:
    - rate_limit_db_data:/var/lib/postgresql/data
    networks:
    - nexus-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d rate_limit_db
      interval: 10s
      timeout: 5s
      retries: 5
  api-keys-service:
    build:
      context: ./api-keys-service
      dockerfile: Dockerfile
    container_name: api-keys-service
    ports:
    - 3005:3005
    environment:
      PORT: 3005
      DB_HOST: api_keys_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: api_keys_db
      KAFKA_BROKER: kafka:9092
      NODE_ENV: production
    depends_on:
      api_keys_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
    - nexus-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:3005/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  rate-limit-service:
    build:
      context: ./rate-limit-service
      dockerfile: Dockerfile
    container_name: rate-limit-service
    ports:
    - 3006:3006
    environment:
      PORT: 3006
      DB_HOST: rate_limit_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rate_limit_db
      KAFKA_BROKER: kafka:9092
      NODE_ENV: production
    depends_on:
      rate_limit_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
    - nexus-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:3006/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
    - kafka
    ports:
    - 8080:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
    - nexus-network
  postgres-file-registry:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: file_registry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - 5432:5432
    volumes:
    - pg_file_registry:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - nexus-network
  postgres-upload-session:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: upload_session_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - 5433:5432
    volumes:
    - pg_upload_session:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - nexus-network
  file-registry:
    build:
      context: ./file-registry
      dockerfile: Dockerfile
    ports:
    - 3007:3007
    environment:
      PORT: 3007
      NODE_ENV: development
      DB_HOST: postgres-file-registry
      DB_PORT: 5432
      DB_NAME: file_registry_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: file-registry
      CHUNK_CATALOG_URL: http://chunk-catalog:3009
      VERSIONING_URL: http://versioning:3013
    depends_on:
      postgres-file-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: 'sh -c "node src/db/migrate.js && node src/index.js"

      '
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - 'require(''http'').get(''http://localhost:3007/health'', r => process.exit(r.statusCode
        === 200 ? 0 : 1)).on(''error'', () => process.exit(1))'
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
    - nexus-network
  upload-session:
    build:
      context: ./upload-session
      dockerfile: Dockerfile
    ports:
    - 3008:3008
    environment:
      PORT: 3008
      NODE_ENV: development
      DB_HOST: postgres-upload-session
      DB_PORT: 5432
      DB_NAME: upload_session_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: upload-session
      FILE_REGISTRY_URL: http://file-registry:3007
      CHUNK_CATALOG_URL: http://chunk-catalog:3009
      SESSION_TTL_MINUTES: 60
    depends_on:
      postgres-upload-session:
        condition: service_healthy
      kafka:
        condition: service_healthy
      file-registry:
        condition: service_healthy
    command: 'sh -c "node src/db/migrate.js && node src/index.js"

      '
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - 'require(''http'').get(''http://localhost:3008/health'', r => process.exit(r.statusCode
        === 200 ? 0 : 1)).on(''error'', () => process.exit(1))'
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
    - nexus-network
networks:
  nexus-network:
    driver: bridge
volumes:
  quota-db-data: null
  url-db-data: null
  api_keys_db_data: null
  rate_limit_db_data: null
  pg_file_registry: null
  pg_upload_session: null
