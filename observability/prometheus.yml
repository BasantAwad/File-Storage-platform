global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'file-registry'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['file-registry:3007']

  - job_name: 'upload-session'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['upload-session:3008']
