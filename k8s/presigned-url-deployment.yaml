apiVersion: apps/v1
kind: Deployment
metadata:
  name: presigned-url-service
  namespace: cse474-prod
  labels:
    app: presigned-url-service
    version: v1
    owner: basant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presigned-url-service
  template:
    metadata:
      labels:
        app: presigned-url-service
        version: v1
    spec:
      containers:
      - name: presigned-url-service
        image: ghcr.io/basantawad/file-storage-platform/presigned-url-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
          name: http
          protocol: TCP
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: port
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: node-env
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: db-name
        - name: STORAGE_GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: storage-gateway-url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: presigned-url-config
              key: log-level
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: presigned-url-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: presigned-url-secrets
              key: db-password
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
