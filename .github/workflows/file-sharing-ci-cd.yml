name: CI/CD - File Sharing

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/file-sharing/**'
      - '.github/workflows/file-sharing-ci-cd.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/file-sharing/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/file-sharing

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/file-sharing/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: services/file-sharing
      
      - name: Run ESLint
        run: npm run lint --if-present
        working-directory: services/file-sharing
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: lint
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/file-sharing/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: services/file-sharing

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/file-sharing/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: services/file-sharing
      
      - name: Run unit tests
        run: npm test -- --testPathPattern="unit.test.js"
        working-directory: services/file-sharing
      
      - name: Run integration tests
        run: npm test -- --testPathPattern="integration.test.js"
        working-directory: services/file-sharing
      
      - name: Generate coverage report
        run: npm test -- --coverage
        working-directory: services/file-sharing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./services/file-sharing/tests/coverage/lcov.info
          flags: file-sharing
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: services/file-sharing
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install cse474 ./helm/cse474 \
            --namespace cse474-prod \
            --create-namespace \
            --values helm/cse474/values.yaml \
            --set fileSharing.image.tag=${{ github.sha }} \
            --wait
        continue-on-error: true
