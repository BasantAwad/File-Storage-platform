name: File Registry CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'file-registry/**'
  pull_request:
    branches: [main]
    paths:
      - 'file-registry/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/file-registry

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: file-registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: file-registry/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Stage 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: file-registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: file-registry/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-file-registry
          path: file-registry/coverage/

  # ── Stage 3: Integration Tests ───────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: file_registry_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
    defaults:
      run:
        working-directory: file-registry
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: file_registry_db_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: localhost:9092
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node src/db/migrate.js
      - run: npm test

  # ── Stage 4 & 5: Docker Build + Push ────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./file-registry
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Stage 6: Deploy to K8s Staging ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to K8s Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig.yaml
      - name: Deploy
        env:
          KUBECONFIG: kubeconfig.yaml
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          kubectl set image deployment/file-registry \
            file-registry=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n file-platform
          kubectl rollout status deployment/file-registry -n file-platform --timeout=120s

  # ── Stage 7: Smoke Test ──────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Health check
        run: |
          curl -f ${{ secrets.STAGING_FILE_REGISTRY_URL }}/health || exit 1
          curl -f ${{ secrets.STAGING_FILE_REGISTRY_URL }}/ready || exit 1

  # ── Stage 8: Tag Release ─────────────────────────────────────────────────────
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4
      - name: Create release tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "file-registry-v"

  # ── Rollback ─────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-test]
    if: failure()
    steps:
      - name: Rollback deployment
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig.yaml
          kubectl rollout undo deployment/file-registry -n file-platform \
            --kubeconfig=kubeconfig.yaml
